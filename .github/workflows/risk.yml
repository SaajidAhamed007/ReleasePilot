name: ReleasePilot Risk

on:
  push:
    branches:
      - main

jobs:
  risk:
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    services:
      sonarqube:
        image: sonarqube:community
        ports:
          - 9000:9000
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for SonarQube
        run: |
          for i in $(seq 1 40); do
            status=$(curl -s http://localhost:9000/api/system/status | jq -r .status || true)
            echo "SonarQube status: $status"
            [ "$status" = "UP" ] && exit 0
            sleep 5
          done
          echo "SonarQube did not start in time" && exit 1

      - name: Bootstrap SonarQube token
        id: sonar
        run: |
          # Fresh server: default creds are admin/admin. Rotate the
          # password (required before token generation) then mint a token.
          curl -s -u admin:admin -X POST \
            "http://localhost:9000/api/users/change_password?login=admin&previousPassword=admin&password=Admin12345!" \
            || true
          TOKEN=$(curl -s -u admin:Admin12345! -X POST \
            "http://localhost:9000/api/user_tokens/generate?name=ci-$RANDOM" | jq -r .token)
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Failed to generate SonarQube token" && exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ steps.sonar.outputs.token }}
          SONAR_HOST_URL: http://localhost:9000

      - name: Generate Risk Report
        env:
          SONAR_TOKEN: ${{ steps.sonar.outputs.token }}
          SONAR_HOST_URL: http://localhost:9000
          SONAR_PROJECT_KEY: releasepilot
        run: node dist/risk.js

      - name: Commit Risk Report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-notes/
          git commit -m "docs: auto generate risk report" || echo "No changes to commit"
          git push || echo "Nothing to push"

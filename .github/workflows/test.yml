name: ReleasePilot Test

on:
  push:
    branches:
      - main

jobs:
  releasepilot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Run ReleasePilot
        run: node dist/index.js
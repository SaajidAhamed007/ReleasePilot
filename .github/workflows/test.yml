name: ReleasePilot Test

on:
  push:
    branches:
      - main

jobs:
  releasepilot:
    # Skip runs triggered by the bot's own commit to avoid infinite loops
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Verify dist/ is up to date
        run: |
          if ! git diff --exit-code -- dist/; then
            echo "::error::dist/ is out of date with src/. Run 'npm run build' and commit the result."
            exit 1
          fi

      - name: Run ReleasePilot
        run: node dist/index.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

name: CI — Build and Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # Never run on commits made by the bot (prevents loops)
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout ReleasePilot
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Bundle action (ncc)
        run: npm run build

      - name: Verify dist/index.js was produced
        run: test -f dist/index.js && echo "✅ dist/index.js exists"

      - name: Commit updated dist/ back to main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet \
            && echo "ℹ️  dist/ unchanged — nothing to commit." \
            || (git commit -m "build: update bundled dist/ [skip ci]" && git push)

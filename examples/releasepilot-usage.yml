# ─────────────────────────────────────────────────────────────────────────────
# Example workflow: use ReleasePilot in YOUR repository
#
# This file is generated automatically when you connect a repository at
# release-pilot-murex.vercel.app — you normally don't need to write it by
# hand. Kept here as a reference for what gets installed and why.
#
# Required secret: RELEASEIQ_TOKEN
#   Issued automatically when you connect your repo. If you need to rotate
#   it, disconnect and reconnect from the ReleaseIQ dashboard.
# ─────────────────────────────────────────────────────────────────────────────

name: Generate Release Notes

on:
  push:
    branches: [main]          # runs on every push to main
  workflow_dispatch:          # also allows manual trigger from the Actions tab

jobs:
  release-notes:
    runs-on: ubuntu-latest

    permissions:
      contents: write         # needed so ReleasePilot can commit the files back

    steps:
      # Step 1 — Check out YOUR repository (with full history for analysis)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # 0 = full history; do not set to 1

      # Step 2 — Run ReleasePilot
      - name: Generate Release Notes
        uses: SaajidAhamed007/ReleasePilot@v1
        with:
          releaseiq-token: ${{ secrets.RELEASEIQ_TOKEN }}
          # All options below are optional — shown with their default values

          # releaseiq-api-url: 'https://release-pilot-murex.vercel.app'
          # github-token: ${{ github.token }}     # token used to commit the files
          # commit-notes: 'true'                  # set to 'false' to skip the commit
          # commit-message: 'docs: update AI-generated release notes [skip ci]'
          # evolution-file: 'release-notes/PROJECT_EVOLUTION.md'
          # latest-commit-file: 'release-notes/LATEST_COMMIT.md'
          # max-commits: '100'


